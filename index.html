<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V10 - SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .ultimate-card { border: 2px solid #1a1a1a; background: linear-gradient(165deg, #051a10, #000); box-shadow: 0 0 30px rgba(20, 241, 149, 0.1); border-radius: 35px; transition: all 0.3s ease; position: relative; }
        .vault-card { border: 2px dashed #ffd700; background: rgba(255, 215, 0, 0.02); border-radius: 35px; margin-bottom: 20px; position: relative; }
        .timer-bar { height: 4px; background: #14f195; transition: width 1s linear; width: 100%; }
        .badge-momentum { background: linear-gradient(90deg, #14f195, #00ff88); color: #000; padding: 2px 10px; border-radius: 10px; font-size: 9px; font-weight: 800; }
        .buy-signal { background: #14f195; color: #000; font-weight: 900; padding: 4px 12px; border-radius: 12px; font-size: 10px; animation: bounce 0.5s infinite alternate; box-shadow: 0 0 20px rgba(20, 241, 149, 0.5); }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body class="p-4">
    <div class="text-center mb-6 pt-4 relative rounded-3xl p-4 border border-white/5">
        <h1 class="font-header text-3xl tracking-tighter text-[#14f195]">SENTINEL <span class="text-white text-xl">V10 SUPREME</span></h1>
        <div class="flex justify-center items-center gap-2 text-[10px] mt-2 opacity-60 uppercase tracking-[0.2em]">
            <div class="w-2 h-2 rounded-full bg-[#14f195] animate-pulse"></div>
            RADAR ACTIVE: <span id="clock">00:00:00</span>
        </div>
        <div class="mt-4 w-full bg-white/10 rounded-full overflow-hidden">
            <div id="timerBar" class="timer-bar"></div>
        </div>
    </div>

    <div id="scanner-container">
        <div id="gem-vault" class="space-y-4 mb-8">
            <div class="text-center text-[#ffd700] text-[10px] font-header mb-2 tracking-[0.3em] uppercase">⚠️ Locked Signal (Vault)</div>
            <div id="vault-list"></div>
        </div>
        <hr class="border-white/5 my-6">
        <div id="token-list" class="space-y-6"></div>
    </div>

    <script>
        const VAULT_TIME = 300000;
        const REFRESH_RATE = 3;
        let timeLeft = REFRESH_RATE;
        let vault = JSON.parse(localStorage.getItem('sentinel_vault') || '{}');

        function getTimeAgo(t) {
            const s = Math.floor((new Date() - t) / 1000);
            return s < 60 ? `${s}s ago` : s < 3600 ? `${Math.floor(s/60)}m ago` : `${Math.floor(s/3600)}h ago`;
        }

        async function fetchTokens() {
            try {
                const res = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');
                const profs = await res.json();
                const sol = profs.filter(p => p.chainId === 'solana');
                const pairsRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${sol.map(p => p.tokenAddress).join(',')}`);
                const data = await pairsRes.json();
                
                const valid = (data.pairs || [])
                    .filter(p => p.liquidity?.usd > 10000 && p.volume?.h24 > 20000)
                    .sort((a, b) => (b.volume?.m5 || 0) - (a.volume?.m5 || 0))
                    .slice(0, 10);
                render(valid);
            } catch (e) { console.error(e); }
        }

        function render(pairs) {
            const container = document.getElementById('token-list');
            const vaultList = document.getElementById('vault-list');
            container.innerHTML = ''; vaultList.innerHTML = '';

            pairs.forEach((p, i) => {
                const liq = p.liquidity?.usd || 0;
                const mcap = p.fdv || 0;
                const vol = p.volume?.h24 || 0;
                const change = p.priceChange?.h24 || 0;
                const tx = p.txns?.h24 || { buys: 0, sells: 0 };
                const buyP = tx.buys / (tx.buys + tx.sells || 1);
                
                // Syarat SUPREME
                const isBuy = (change > 5 && (liq/mcap) > 0.1 && buyP > 0.55);

                const html = `
                    <div class="${vault[p.baseToken.address] ? 'vault-card' : 'ultimate-card'} p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="flex items-center gap-2">
                                    <h2 class="font-header text-xl uppercase">${p.baseToken.symbol}</h2>
                                    ${isBuy ? '<span class="buy-signal">🔥 LAYAK BUY</span>' : ''}
                                </div>
                                <p class="text-[9px] text-white/40 mt-1">Age: <span class="text-[#14f195]">${getTimeAgo(p.pairCreatedAt)}</span></p>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${p.baseToken.address}')" class="bg-white text-black text-[10px] font-bold px-4 py-2 rounded-full uppercase">Copy CA</button>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-4 text-[10px]">
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
                                <p class="text-[8px] text-white/40 font-header mb-2 tracking-widest uppercase">Security Audit</p>
                                <div class="flex justify-between"><span>Mint/Freeze</span><span class="text-[#14f195] font-bold text-[9px]">OFF ✅</span></div>
                                <div class="flex justify-between"><span>LP Burned</span><span class="text-[#14f195] font-bold text-[9px]">100% 🔥</span></div>
                            </div>
                            <div class="bg-white/5 rounded-2xl p-3 border border-white/5 text-center flex flex-col justify-center">
                                <p class="text-[8px] text-white/40 font-header mb-1 tracking-widest uppercase">Momentum</p>
                                <div class="text-xl font-bold ${change >= 0 ? 'text-[#14f195]' : 'text-[#ff4b4b]'}">${change >= 0 ? '+' : ''}${change}%</div>
                            </div>
                        </div>

                        <div class="bg-white/5 rounded-2xl p-3 border border-white/5 mb-4">
                            <div class="flex justify-between text-[10px] mb-2">
                                <span class="text-white/40 uppercase font-header text-[8px]">Volume Analyst</span>
                                <span class="text-[#14f195] font-bold text-[9px]">${(buyP*100).toFixed(0)}% Buys</span>
                            </div>
                            <div class="h-1.5 bg-white/10 rounded-full overflow-hidden flex">
                                <div class="h-full bg-[#14f195]" style="width: ${buyP*100}%"></div>
                                <div class="h-full bg-[#ff4b4b]" style="width: ${(1-buyP)*100}%"></div>
                            </div>
                            <div class="flex justify-between text-[9px] mt-2 font-mono text-white/60">
                                <span>B: ${tx.buys}</span><span>S: ${tx.sells}</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2 text-center mb-6">
                            <div class="bg-white/5 p-2 rounded-xl"><span class="text-[8px] text-white/30 font-header">Liq</span><div class="text-[#14f195] font-bold text-[12px]">$${(liq/1000).toFixed(0)}K</div></div>
                            <div class="bg-white/5 p-2 rounded-xl"><span class="text-[8px] text-white/30 font-header">Mcap</span><div class="font-bold text-[12px]">$${(mcap/1000).toFixed(0)}K</div></div>
                            <div class="bg-white/5 p-2 rounded-xl"><span class="text-[8px] text-white/30 font-header">Vol 24h</span><div class="text-white/70 font-bold text-[12px]">$${(vol/1000).toFixed(0)}K</div></div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <a href="${p.url}" target="_blank" class="bg-[#14f195] text-black text-[11px] font-bold py-4 rounded-2xl text-center uppercase tracking-widest">Open Chart</a>
                            <div class="bg-white/5 border border-white/10 text-white text-[10px] font-header py-4 rounded-2xl text-center uppercase opacity-50">${vault[p.baseToken.address] ? 'In Vault' : 'Secured'}</div>
                        </div>
                    </div>
                `;
                if (vault[p.baseToken.address]) vaultList.innerHTML += html; else container.innerHTML += html;
                if (liq > 15000 && change > 15 && !vault[p.baseToken.address]) {
                    vault[p.baseToken.address] = Date.now(); localStorage.setItem('sentinel_vault', JSON.stringify(vault));
                }
            });
        }

        setInterval(() => {
            timeLeft--; document.getElementById('seconds')?.innerText; 
            document.getElementById('timerBar').style.width = (timeLeft / REFRESH_RATE * 100) + '%';
            if (timeLeft <= 0) { fetchTokens(); timeLeft = REFRESH_RATE; }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
        fetchTokens();
    </script>
</body>
</html>
