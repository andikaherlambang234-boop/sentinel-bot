<style>
:root{--g:#14f195;--r:#ff4b4b;--gold:#ffd700;--blue:#06b6d4;--purple:#8b5cf6;--orange:#f97316;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden;}
.hdr{font-family:'Orbitron',sans-serif;}

/* ── CARDS ── */
.gem-card{border:1px solid #1a1a1a;background:linear-gradient(160deg,#030b06 0%,#000 100%);border-radius:18px;position:relative;overflow:hidden;transition:box-shadow .3s,border-color .3s;}
.gem-card::before{content:'';position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent);opacity:.25;pointer-events:none;}
.vault-card{border:1.5px dashed var(--gold);background:rgba(255,215,0,.018);border-radius:18px;}
.cascade-card{border:2px solid #ff4b4b!important;box-shadow:0 0 32px rgba(255,75,75,.4)!important;animation:cascade-pulse 1s ease-in-out infinite alternate;}
@keyframes cascade-pulse{from{box-shadow:0 0 20px rgba(255,75,75,.3)}to{box-shadow:0 0 50px rgba(255,75,75,.65),0 0 90px rgba(255,75,75,.18)}}
.sell-card{border:2px solid #dc2626!important;box-shadow:0 0 24px rgba(220,38,38,.35)!important;}
.rank-1{border-color:#fbbf24!important;box-shadow:0 0 24px rgba(251,191,36,.3)!important;}
.rank-2{border-color:#94a3b8!important;box-shadow:0 0 16px rgba(148,163,184,.2)!important;}
.rank-3{border-color:#c2410c!important;box-shadow:0 0 12px rgba(194,65,12,.2)!important;}

/* ── BADGES ── */
.badge{font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:2px;margin-right:3px;margin-bottom:3px;letter-spacing:.04em;line-height:1.4;}
.b-gold{background:linear-gradient(45deg,#ffd700,#bf953f);color:#000;box-shadow:0 0 8px rgba(255,215,0,.4);}
.b-silver{background:linear-gradient(45deg,#e2e8f0,#94a3b8);color:#000;}
.b-bronze{background:linear-gradient(45deg,#cd7f32,#a0522d);color:#fff;}
.b-pump{background:#ef4444;color:#fff;animation:blink .6s infinite;}
.b-early{background:var(--blue);color:#fff;animation:blink .9s infinite;box-shadow:0 0 8px rgba(6,182,212,.4);}
.b-whale{background:#f97316;color:#fff;}
.b-new{background:#8b5cf6;color:#fff;animation:blink 1.1s infinite;}
.b-safe{background:#10b981;color:#fff;}
.b-warn{background:#f59e0b;color:#000;}
.b-danger{background:#dc2626;color:#fff;}
.b-spike{background:linear-gradient(45deg,#f97316,#ef4444);color:#fff;animation:blink .7s infinite;box-shadow:0 0 8px rgba(249,115,22,.5);}
.b-cascade{background:linear-gradient(45deg,#ff4b4b,#ff0080);color:#fff;animation:blink .4s infinite;box-shadow:0 0 12px rgba(255,0,128,.6);font-size:9px;padding:3px 9px;}
.b-corr{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.5);color:#a78bfa;}
.b-smart{background:linear-gradient(45deg,#0ea5e9,#06b6d4);color:#fff;box-shadow:0 0 8px rgba(6,182,212,.4);}
.b-conc-hi{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.55);color:#f87171;}/* V17 FIX: was missing */
.b-conc-mid{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.5);color:#fbbf24;}
.b-conc-ok{background:rgba(20,241,149,.1);border:1px solid rgba(20,241,149,.4);color:var(--g);}
.b-rug-safe{background:rgba(20,241,149,.12);border:1px solid rgba(20,241,149,.5);color:var(--g);}
.b-rug-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.5);color:#f59e0b;}
.b-rug-danger{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.5);color:#f87171;}
.b-checking{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.25);animation:blink 1.5s infinite;}
.b-sell{background:linear-gradient(45deg,#dc2626,#991b1b);color:#fff;animation:blink .5s infinite;box-shadow:0 0 8px rgba(220,38,38,.5);}
.b-exit{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.5);color:#f87171;}
.b-reversal{background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.5);color:#fbbf24;animation:blink .8s infinite;}
.b-mom-hi{background:linear-gradient(45deg,#14f195,#06b6d4);color:#000;font-weight:900;box-shadow:0 0 8px rgba(20,241,149,.45);}
.b-mom-pos{background:rgba(20,241,149,.1);border:1px solid rgba(20,241,149,.3);color:var(--g);}
.b-snipe{background:linear-gradient(45deg,#8b5cf6,#6366f1);color:#fff;animation:blink .85s infinite;box-shadow:0 0 8px rgba(139,92,246,.5);}
.b-trending{background:linear-gradient(45deg,#f97316,#fbbf24);color:#000;font-weight:900;box-shadow:0 0 8px rgba(249,115,22,.45);animation:blink .75s infinite;}/* V17 NEW */
.b-boosted{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.4);color:#fb923c;}/* V17 NEW */
.b-bl{background:rgba(100,100,100,.1);border:1px solid rgba(100,100,100,.25);color:rgba(255,255,255,.25);}/* V17 blacklist */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.42}}

/* ── SUPREME ── */
.supreme{background:var(--g);color:#000;font-weight:900;padding:3px 11px;border-radius:8px;font-size:9px;animation:pop .7s infinite alternate;box-shadow:0 0 18px rgba(20,241,149,.6);font-family:'Orbitron',sans-serif;letter-spacing:.04em;}
@keyframes pop{from{transform:scale(1)}to{transform:scale(1.05)}}

/* ── GRADE RING ── */
.grade-ring{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:13px;flex-shrink:0;}
.grade-A{background:rgba(20,241,149,.13);border:2px solid var(--g);color:var(--g);}
.grade-B{background:rgba(96,165,250,.1);border:2px solid #60a5fa;color:#60a5fa;}
.grade-C{background:rgba(251,191,36,.1);border:2px solid #fbbf24;color:#fbbf24;}
.grade-D{background:rgba(239,68,68,.1);border:2px solid var(--r);color:var(--r);}
.grade-F{background:rgba(127,29,29,.2);border:2px solid #7f1d1d;color:#7f1d1d;}

/* ── BARS ── */
.bar-wrap{background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .7s ease;}

/* ── GLASS PANEL ── */
.gp{background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.048);border-radius:11px;padding:8px 10px;}

/* ── HUD ── */
#hud{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:900;display:none;flex-direction:column;justify-content:center;align-items:center;}
.radar{width:96px;height:96px;border:2px solid var(--g);border-radius:50%;position:relative;overflow:hidden;box-shadow:0 0 24px rgba(20,241,149,.3);}
.sweep{position:absolute;width:50%;height:50%;background:conic-gradient(rgba(20,241,149,.5),transparent);top:0;left:0;transform-origin:bottom right;animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.hud-lbl{font-family:'Orbitron',sans-serif;letter-spacing:.28em;color:var(--g);text-shadow:0 0 14px var(--g);font-size:10px;}

/* ── ERROR ── */
#err-panel{display:none;background:rgba(220,38,38,.05);border:1px solid rgba(220,38,38,.2);border-radius:13px;padding:11px 13px;margin-bottom:10px;}
#err-panel.on{display:block;}
.ec{color:#f87171;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:.15em;}
.ed{color:rgba(255,255,255,.36);font-size:9px;margin-top:4px;line-height:1.7;}
.eh{color:rgba(255,200,80,.55);font-size:9px;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.06);line-height:1.6;}
#retry-btn{margin-top:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:#fca5a5;font-size:9px;padding:4px 12px;border-radius:8px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:.1em;}

/* ── OVERLAY / PANEL ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:700;display:none;align-items:flex-end;will-change:transform;}
.panel-overlay.on{display:flex;}
.panel-drawer{background:#0a0a0a;border-top:1px solid rgba(255,255,255,.07);border-radius:22px 22px 0 0;width:100%;max-height:84vh;overflow-y:auto;padding:18px 15px 40px;}
.full-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:800;display:none;align-items:flex-end;will-change:transform;}
.full-overlay.on{display:flex;}
.full-drawer{background:#090909;border-top:2px solid rgba(20,241,149,.18);border-radius:22px 22px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;}

/* ── AI CHAT ── */
.chat-header{padding:15px 15px 11px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;min-height:160px;}
.chat-msg{max-width:86%;padding:9px 12px;border-radius:14px;font-size:10px;line-height:1.68;}
