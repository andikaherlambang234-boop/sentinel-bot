<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V10 - PROFIT 50%</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .ultimate-card { border: 1px solid #1a1a1a; background: linear-gradient(165deg, #051a10, #000); box-shadow: 0 0 20px rgba(20,241,149,0.05); border-radius: 30px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .ultimate-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #14f195, transparent); opacity: 0.5; }
        .vault-card { border: 2px dashed #ffd700; background: rgba(255,215,0,0.03); border-radius: 30px; }
        .timer-bar { height: 4px; background: #14f195; transition: width 1s linear; width: 100%; box-shadow: 0 0 10px #14f195; }
        .badge-status { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; margin-right: 4px; display: inline-block; }
        .bg-early   { background: #06b6d4; color:#fff; animation: pulse-fast 0.8s infinite; box-shadow: 0 0 10px rgba(6,182,212,0.5); }
        .bg-surging { background: #ef4444; color:#fff; animation: pulse-fast 0.6s infinite; }
        .bg-whale   { background: #f97316; color:#fff; animation: pulse-fast 0.8s infinite; }
        .bg-rank-1  { background: linear-gradient(45deg,#ffd700,#bf953f); color:#000; box-shadow:0 0 15px rgba(255,215,0,0.6); }
        .bg-rank-2  { background: linear-gradient(45deg,#e2e8f0,#94a3b8); color:#000; box-shadow:0 0 15px rgba(226,232,240,0.5); }
        .bg-rank-3  { background: linear-gradient(45deg,#cd7f32,#a0522d); color:#fff; box-shadow:0 0 15px rgba(205,127,50,0.5); }
        .buy-signal { background:#14f195; color:#000; font-weight:900; padding:4px 12px; border-radius:12px; font-size:10px; animation:bounce 0.6s infinite alternate; box-shadow:0 0 20px rgba(20,241,149,0.6); }
        @keyframes bounce    { from{transform:scale(1)} to{transform:scale(1.05)} }
        @keyframes pulse-fast{ 0%,100%{opacity:1} 50%{opacity:0.6} }
        .glass-panel { background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); }
        #hud-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:100;display:none;flex-direction:column;justify-content:center;align-items:center; }
        .radar-circle { width:150px;height:150px;border:2px solid #14f195;border-radius:50%;position:relative;overflow:hidden;box-shadow:0 0 20px rgba(20,241,149,0.3); }
        .radar-sweep { position:absolute;width:50%;height:50%;background:linear-gradient(45deg,transparent,rgba(20,241,149,0.4));top:0;left:0;transform-origin:bottom right;animation:sweep 2s linear infinite; }
        @keyframes sweep { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .hud-text { font-family:'Orbitron',sans-serif;letter-spacing:0.3em;color:#14f195;text-shadow:0 0 10px #14f195; }
        #hud-err-line { display:none;margin-top:12px;font-size:9px;color:#ff6666;font-family:monospace;letter-spacing:0.1em;text-align:center;max-width:280px;word-break:break-all; }
        #retry-counter { font-size:9px;color:rgba(255,200,80,0.7);font-family:'Orbitron',sans-serif;margin-top:6px;display:none; }
        #error-panel { display:none;background:rgba(255,50,50,0.07);border:1px solid rgba(255,80,80,0.3);border-radius:16px;padding:14px 16px;margin-bottom:16px; }
        #error-panel.show { display:block; }
        .err-code   { color:#ff5555;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.2em;font-weight:700; }
        .err-detail { color:rgba(255,255,255,0.5);font-size:10px;margin-top:6px;line-height:1.7; }
        .err-hint   { color:rgba(255,200,100,0.7);font-size:9px;margin-top:6px;line-height:1.6;border-top:1px solid rgba(255,255,255,0.08);padding-top:6px; }
        #retry-btn  { margin-top:10px;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.3);color:#ff8888;font-size:9px;padding:5px 14px;border-radius:8px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:0.1em; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

<div id="hud-overlay">
    <div class="radar-circle mb-6"><div class="radar-sweep"></div></div>
    <div id="hud-text" class="hud-text text-sm uppercase animate-pulse">SYNCING CORE...</div>
    <div class="mt-4 w-32 h-1 bg-white/10 rounded-full overflow-hidden">
        <div id="hud-bar" class="h-full bg-[#14f195] transition-all duration-500" style="width:0%"></div>
    </div>
    <div id="hud-err-line"></div>
    <div id="retry-counter"></div>
</div>

<div class="text-center mb-4 pt-4 relative rounded-3xl p-4 border border-white/5 bg-white/[0.02]">
    <h1 class="font-header text-3xl tracking-tighter text-[#14f195]">SENTINEL <span class="text-white text-xl">V10 GENIUS</span></h1>
    <div class="flex justify-center items-center gap-2 text-[10px] mt-2 opacity-60 uppercase tracking-[0.2em]">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-[#14f195] animate-pulse"></div>
        RADAR: <span id="clock">00:00:00</span> | <span id="api-status">SYNCING...</span>
    </div>
    <div class="mt-4 w-full bg-white/10 rounded-full overflow-hidden">
        <div id="timerBar" class="timer-bar"></div>
    </div>
</div>

<div id="error-panel">
    <div class="err-code"  id="err-code-txt">ERR_UNKNOWN</div>
    <div class="err-detail" id="err-detail-txt">-</div>
    <div class="err-hint"   id="err-hint-txt"></div>
    <button id="retry-btn" onclick="manualRetry()">RETRY SEKARANG</button>
</div>

<div id="scanner-container">
    <div id="gem-vault" class="hidden space-y-4 mb-8">
        <div class="text-center text-[#ffd700] text-[10px] font-header mb-2 tracking-[0.3em] uppercase">Locked Signal (Vault)</div>
        <div id="vault-list" class="space-y-4"></div>
    </div>
    <div id="token-list" class="space-y-6"></div>
</div>

<script>
var CFG = {
    REFRESH:      30,
    MIN_LIQ:    5000,
    RPC:        'https://api.mainnet-beta.solana.com',
    CHUNK:         5,
    MAX_RETRY:     3,
    RETRY_MS:   5000,
    TIMEOUT_MS: 12000
};

var timeLeft   = CFG.REFRESH;
var retryCount = 0;
var isFetching = false;
var notified   = {};
var vault      = {};
try { vault = JSON.parse(localStorage.getItem('sv10') || '{}'); } catch(e) {}

// ══════════════════════════════════════════════
// FETCH WITH TIMEOUT — tanpa AbortSignal sama sekali
// Promise.race aman di semua mobile browser
// ══════════════════════════════════════════════
function safeFetch(url, opts) {
    var fetchP = fetch(url, opts || {});
    var timeP  = new Promise(function(resolve, reject) {
        setTimeout(function() {
            var e = new Error('TIMEOUT');
            e._code = 'ERR_TIMEOUT';
            reject(e);
        }, CFG.TIMEOUT_MS);
    });
    return Promise.race([fetchP, timeP]);
}

// ══════════════════════════════════════════════
// ERROR CLASSIFIER
// ══════════════════════════════════════════════
function classify(err, stage) {
    var m    = String(err && err.message || err).toUpperCase();
    var http = err && err._httpStatus ? err._httpStatus : 0;

    if (m === 'TIMEOUT' || err._code === 'ERR_TIMEOUT') {
        return { code:'ERR_TIMEOUT', detail:'['+stage+'] Request melebihi '+CFG.TIMEOUT_MS/1000+'s.', hint:'Koneksi lambat atau server sedang overload. Coba lagi.' };
    }
    if (http === 429 || m.indexOf('429') >= 0) {
        return { code:'ERR_429_RATE_LIMIT', detail:'['+stage+'] Server menolak: terlalu banyak request.', hint:'Naikkan REFRESH ke 60 detik. Public RPC sangat terbatas.' };
    }
    if (http === 403) {
        return { code:'ERR_403_FORBIDDEN', detail:'['+stage+'] Akses ditolak (403).', hint:'Domain GitHub Pages mungkin diblokir API. Coba buka dari file lokal.' };
    }
    if (http === 404) {
        return { code:'ERR_404_NOT_FOUND', detail:'['+stage+'] Endpoint tidak ditemukan (404).', hint:'DexScreener mungkin mengubah URL. Cek dokumentasi API mereka.' };
    }
    if (http >= 500) {
        return { code:'ERR_'+http+'_SERVER', detail:'['+stage+'] Server error internal ('+http+').', hint:'Server sedang down. Tunggu beberapa menit lalu retry.' };
    }
    if (m.indexOf('FAILED TO FETCH') >= 0 || m.indexOf('NETWORKERROR') >= 0 || m.indexOf('LOAD FAILED') >= 0 || m.indexOf('NETWORK REQUEST FAILED') >= 0) {
        return { code:'ERR_NETWORK_CORS', detail:'['+stage+'] Request diblokir jaringan atau CORS.', hint:'Di GitHub Pages: DexScreener harus mengizinkan domain *.github.io. Atau tambahkan "https://corsproxy.io/?" sebelum URL API di dalam kode.' };
    }
    if (m.indexOf('JSON') >= 0 || m.indexOf('SYNTAX') >= 0 || m.indexOf('INVALID') >= 0) {
        return { code:'ERR_INVALID_JSON', detail:'['+stage+'] Server tidak mengembalikan JSON valid.', hint:'Server mungkin mengirim halaman HTML error. Cek Network tab di DevTools.' };
    }
    if (m.indexOf('TYPEERROR') >= 0 || m.indexOf('CANNOT READ') >= 0 || m.indexOf('UNDEFINED') >= 0) {
        return { code:'ERR_PARSE_STRUCTURE', detail:'['+stage+'] Struktur data API berubah.', hint:'DexScreener mungkin mengubah format JSON response-nya.' };
    }
    return { code:'ERR_UNKNOWN', detail:'['+stage+'] '+String(err && err.message || err).slice(0,120), hint:'Buka DevTools (F12/Inspect) lalu lihat tab Console untuk detail.' };
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function hudShow(txt) {
    document.getElementById('hud-overlay').style.display = 'flex';
    document.getElementById('hud-text').innerText = txt;
    document.getElementById('hud-bar').style.width = '40%';
}
function hudHide() {
    document.getElementById('hud-overlay').style.display = 'none';
    document.getElementById('hud-bar').style.width = '0%';
    var a = document.getElementById('hud-err-line');
    var b = document.getElementById('retry-counter');
    if(a) a.style.display = 'none';
    if(b) b.style.display = 'none';
}
function showError(info) {
    document.getElementById('err-code-txt').innerText   = 'ERROR: ' + info.code;
    document.getElementById('err-detail-txt').innerText = info.detail;
    document.getElementById('err-hint-txt').innerText   = 'SOLUSI: ' + info.hint;
    document.getElementById('error-panel').classList.add('show');
    var el = document.getElementById('hud-err-line');
    el.innerText = info.code;
    el.style.display = 'block';
    console.error('[SENTINEL]', info.code, '|', info.detail);
}
function clearError() {
    document.getElementById('error-panel').classList.remove('show');
}
function setStatus(txt, dot) {
    document.getElementById('api-status').innerText = txt;
    document.getElementById('status-dot').className = 'w-2 h-2 rounded-full ' + dot;
}

// ══════════════════════════════════════════════
// SAFE JSON — baca body dulu, baru parse
// ══════════════════════════════════════════════
function safeJson(res, stage) {
    return res.text().then(function(txt) {
        try { return JSON.parse(txt); }
        catch(e) {
            var err = new Error('INVALID JSON at ' + stage + ': ' + txt.slice(0,60));
            throw err;
        }
    });
}

// ══════════════════════════════════════════════
// AUDIT ONE TOKEN
// ══════════════════════════════════════════════
function auditOne(p) {
    return safeFetch(CFG.RPC, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ jsonrpc:'2.0', id:1, method:'getTokenLargestAccounts', params:[p.baseToken.address] })
    }).then(function(res) {
        return safeJson(res, 'AUDIT_RPC');
    }).then(function(data) {
        if (data.error) {
            console.warn('[AUDIT]', p.baseToken.symbol, data.error.message);
            return { grade:'?', detail:'RPC Err', color:'text-white/30', isWhaleRisk:false };
        }
        if (!data.result || !data.result.value) {
            return { grade:'?', detail:'No Result', color:'text-white/30', isWhaleRisk:false };
        }
        var conc = 0;
        data.result.value.forEach(function(a){ conc += parseInt(a.amount)||0; });
        var whale = conc > 1000000000000;
        return { grade:whale?'C':'A', detail:whale?'High Concentration':'Distributed', color:whale?'text-yellow-500':'text-[#14f195]', isWhaleRisk:whale };
    }).catch(function(e) {
        var info = classify(e, 'AUDIT');
        console.warn('[AUDIT SKIP]', p.baseToken && p.baseToken.symbol, info.code);
        return { grade:'?', detail:info.code, color:'text-white/20', isWhaleRisk:false };
    });
}

// Chunked audit — max 5 paralel per batch, jeda 600ms antar batch
function auditAll(pairs) {
    var results = [];
    var i = 0;
    function nextChunk() {
        if (i >= pairs.length) return Promise.resolve(results);
        var batch = pairs.slice(i, i + CFG.CHUNK);
        i += CFG.CHUNK;
        return Promise.all(batch.map(auditOne)).then(function(res) {
            results = results.concat(res);
            if (i < pairs.length) {
                return new Promise(function(r){ setTimeout(r, 600); }).then(nextChunk);
            }
            return results;
        });
    }
    return nextChunk();
}

// ══════════════════════════════════════════════
// MAIN FETCH
// ══════════════════════════════════════════════
function fetchTokens() {
    if (isFetching) return;
    isFetching = true;

    hudShow('SCANNING CORE...');
    setStatus('SCANNING...', 'bg-yellow-400 animate-pulse');
    clearError();

    safeFetch('https://api.dexscreener.com/token-profiles/latest/v1')
    .then(function(res) {
        if (!res.ok) {
            var e = new Error('HTTP '+res.status); e._httpStatus = res.status; e._stage = 'PROFILE_FETCH'; throw e;
        }
        return safeJson(res, 'PROFILE_PARSE');
    })
    .then(function(profiles) {
        if (!Array.isArray(profiles)) {
            var e = new Error('TYPEERROR profiles not array'); e._stage = 'PROFILE_PARSE'; throw e;
        }
        var sol = profiles.filter(function(p){ return p.chainId === 'solana'; }).slice(0, 20);
        if (sol.length === 0) { render([]); return null; }
        var addrs = sol.map(function(p){ return p.tokenAddress; }).join(',');
        return safeFetch('https://api.dexscreener.com/latest/dex/tokens/' + addrs)
            .then(function(res2) {
                if (!res2.ok) {
                    var e = new Error('HTTP '+res2.status); e._httpStatus = res2.status; e._stage = 'PAIRS_FETCH'; throw e;
                }
                return safeJson(res2, 'PAIRS_PARSE');
            });
    })
    .then(function(pairsData) {
        if (!pairsData) return; // kosong
        var pairs = (pairsData.pairs || []).filter(function(p){ return p.liquidity && p.liquidity.usd > CFG.MIN_LIQ; });
        return auditAll(pairs).then(function(audits) {
            var processed = pairs.map(function(p, idx) {
                var audit = audits[idx] || { grade:'?', detail:'?', color:'text-white/20', isWhaleRisk:false };
                var tx       = p.txns && p.txns.h24 || { buys:0, sells:0 };
                var buyRatio = tx.buys / (tx.buys + tx.sells || 1);
                var m5       = p.priceChange && p.priceChange.m5 || 0;
                var signal   = 'NONE';
                if (m5 > 3  && buyRatio > 0.50) signal = 'EARLY';
                if (m5 > 15 && buyRatio > 0.70 && audit.grade === 'A') signal = 'SUPREME';
                var liq      = p.liquidity && p.liquidity.usd || 1;
                var vol      = p.volume && p.volume.h24 || 0;
                var omni     = (buyRatio * 50) + (m5 * 2);
                var rr       = (audit.grade==='A' && signal==='EARLY') ? 'High Reward' : (audit.isWhaleRisk ? 'High Risk' : 'Moderate');
                return { p:p, signal:signal, audit:audit, buyRatio:buyRatio, m5:m5, volatility:vol/liq, riskReward:rr, omni:omni };
            });
            var genius = processed.filter(function(x) {
                if (x.audit.grade === 'F') return false;
                return x.signal==='EARLY' || x.signal==='SUPREME' || (x.buyRatio>0.55 && x.m5>2) || (x.omni>30 && x.buyRatio>0.55);
            }).sort(function(a,b){ return b.omni - a.omni; });

            genius.forEach(function(x) {
                var addr = x.p.baseToken && x.p.baseToken.address;
                if (addr && !notified[addr]) {
                    if (x.signal==='SUPREME' || x.signal==='EARLY') pushNotif(x.p.baseToken.symbol, x.signal);
                    notified[addr] = 1;
                }
            });
            render(genius);
        });
    })
    .then(function() {
        setStatus('ACTIVE', 'bg-[#14f195] animate-pulse');
        hudHide();
        retryCount = 0;
        isFetching = false;
    })
    .catch(function(err) {
        isFetching = false;
        var stage = err && err._stage || 'UNKNOWN';
        var info  = classify(err, stage);
        showError(info);
        retryCount++;
        setStatus('ERROR ('+retryCount+'x)', 'bg-red-500');
        hudShow('RECONNECTING...');

        if (retryCount <= CFG.MAX_RETRY) {
            var rc = document.getElementById('retry-counter');
            rc.innerText = 'AUTO-RETRY '+retryCount+'/'+CFG.MAX_RETRY+'...';
            rc.style.display = 'block';
            setTimeout(function() { fetchTokens(); }, CFG.RETRY_MS);
        } else {
            hudHide(); // tutup HUD, tampilkan error panel
        }
    });
}

function manualRetry() {
    retryCount = 0;
    timeLeft   = 1;
    fetchTokens();
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(genius) {
    var container    = document.getElementById('token-list');
    var vaultList    = document.getElementById('vault-list');
    var vaultSection = document.getElementById('gem-vault');

    genius.forEach(function(x) {
        if (x.signal==='SUPREME' && x.p.baseToken && x.p.baseToken.address) {
            vault[x.p.baseToken.address] = { symbol:x.p.baseToken.symbol, time:Date.now() };
        }
    });
    try { localStorage.setItem('sv10', JSON.stringify(vault)); } catch(e) {}

    var main  = genius.filter(function(x){ return !vault[x.p.baseToken && x.p.baseToken.address]; });
    var inVlt = genius.filter(function(x){ return  vault[x.p.baseToken && x.p.baseToken.address]; });

    container.innerHTML = main.length === 0
        ? '<div class="text-center p-12 opacity-40"><div class="w-12 h-12 border-4 border-[#14f195] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p class="font-header text-xs tracking-widest text-[#14f195]">SCANNING BLOCKCHAIN...</p><p class="text-[10px] mt-2">Belum ada token memenuhi kriteria.</p></div>'
        : main.map(function(x,i){ return card(x,false,i+1); }).join('');

    if (inVlt.length > 0) {
        vaultSection.classList.remove('hidden');
        vaultList.innerHTML = inVlt.map(function(x,i){ return card(x,true,i+1); }).join('');
    } else {
        vaultSection.classList.add('hidden');
    }
}

function timeAgo(t) {
    var s = Math.floor((Date.now()-t)/1000);
    if (s < 60)   return s+'s ago';
    if (s < 3600) return Math.floor(s/60)+'m ago';
    return Math.floor(s/3600)+'h ago';
}
function fmtK(n) { return '$'+(n/1000).toFixed(0)+'K'; }

function card(x, isVault, rank) {
    var p      = x.p;
    var liq    = p.liquidity && p.liquidity.usd || 0;
    var mcap   = p.fdv || 0;
    var change = p.priceChange && p.priceChange.h24 || 0;
    var sell   = (1 - x.buyRatio) * 100;
    var sym    = p.baseToken && p.baseToken.symbol || '???';
    var addr   = p.baseToken && p.baseToken.address || '';
    var url    = p.url || '#';

    var rClass='', rGlow='', rBadge='';
    if (rank===1){ rClass='border-yellow-400'; rGlow='shadow-[0_0_25px_rgba(250,204,21,0.4)]'; rBadge='<span class="badge-status bg-rank-1">ELITE GEM</span>'; }
    else if(rank===2){ rClass='border-slate-300'; rGlow='shadow-[0_0_20px_rgba(203,213,225,0.3)]'; rBadge='<span class="badge-status bg-rank-2">PRIME GEM</span>'; }
    else if(rank===3){ rClass='border-orange-600'; rGlow='shadow-[0_0_15px_rgba(154,52,18,0.3)]'; rBadge='<span class="badge-status bg-rank-3">ALPHA GEM</span>'; }

    var badges = [];
    if (rank<=3)          badges.push(rBadge);
    if (x.m5 > 10)        badges.push('<span class="badge-status bg-surging">PUMPING</span>');
    if (x.audit.isWhaleRisk) badges.push('<span class="badge-status bg-whale">WHALE</span>');
    if (x.signal==='EARLY')  badges.push('<span class="badge-status bg-early">EARLY</span>');

    var cc = change >= 0 ? 'text-[#14f195]' : 'text-[#ff4b4b]';
    var cs = (change>=0?'+':'')+change+'%';

    return '<div class="'+(isVault?'vault-card':'ultimate-card')+' '+rClass+' '+rGlow+' p-6">'
        +'<div class="flex justify-between items-start mb-3">'
            +'<div>'
                +'<div class="flex items-center gap-2">'
                    +'<span class="font-header text-[#14f195] text-sm">#'+rank+'</span>'
                    +'<h2 class="font-header text-xl uppercase">'+sym+'</h2>'
                    +(x.signal==='SUPREME'?'<span class="buy-signal">SUPREME BUY</span>':'')
                +'</div>'
                +'<div class="mt-2 flex flex-wrap gap-1">'+badges.join('')+'</div>'
                +'<p class="text-[9px] text-white/40 mt-2">Age: <span class="text-[#14f195]">'+timeAgo(p.pairCreatedAt)+'</span></p>'
            +'</div>'
            +'<button onclick="try{navigator.clipboard.writeText(\''+addr+'\')}catch(e){}" class="bg-white text-black text-[10px] font-bold px-3 py-2 rounded-full uppercase">Copy CA</button>'
        +'</div>'
        +'<div class="grid grid-cols-2 gap-3 mb-4 text-[10px]">'
            +'<div class="glass-panel rounded-2xl p-3 border border-white/5">'

function pushNotif(sym, signal) {
    try {
        if (Notification && Notification.permission === 'granted') {
            new Notification(signal==='SUPREME' ? 'SUPREME GEM!' : 'Signal Baru!', {
                body: sym + ' signal ' + signal + '. Cek Sentinel!'
            });
        }
    } catch(e) {}
}

// TIMER LOOP
// ══════════════════════════════════════════════
setInterval(function() {
    timeLeft--;
    var pct = Math.max(0, timeLeft / CFG.REFRESH * 100);
    document.getElementById('timerBar').style.width = pct + '%';
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    if (timeLeft <= 0) {
        fetchTokens();
        timeLeft = CFG.REFRESH;
    }
}, 1000);

fetchTokens();
