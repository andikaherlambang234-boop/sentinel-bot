<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL v10 - ULTIMATE DEEP AUDIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .ultimate-card { border: 2px solid #14f195; background: linear-gradient(165deg, #051a10, #000); box-shadow: 0 0 30px rgba(20, 241, 149, 0.1); border-radius: 35px; }
        .vault-card { border: 2px dashed #ffd700; background: rgba(255, 215, 0, 0.02); border-radius: 35px; margin-bottom: 20px; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(20,241,149,0.05), transparent); background-size: 200% 100%; animation: shimmer 3s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .copy-btn:active { transform: scale(0.9); background: #14f195 !important; color: #000 !important; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto mb-6 p-6 rounded-[2.5rem] bg-[#0a0a0a] border border-white/5 text-center relative shimmer">
        <h1 class="text-2xl font-header font-black text-[#14f195] italic tracking-tighter">SENTINEL <span class="text-white">V10</span></h1>
        <div class="flex items-center justify-center gap-2 mt-2">
            <div class="h-1.5 w-1.5 rounded-full bg-green-500 shadow-[0_0_10px_#14f195]"></div>
            <p id="liveStatus" class="text-[8px] text-gray-500 font-bold uppercase tracking-[0.4em]">Neural Audit: Active</p>
        </div>
    </div>

    <div id="vaultArea" class="max-w-md mx-auto hidden">
        <h3 class="text-[9px] font-header text-[#ffd700] text-center mb-4 tracking-[0.3em] uppercase">⚠️ Locked Signal (5m)</h3>
        <div id="vaultList" class="space-y-6"></div>
        <hr class="border-white/5 my-8">
    </div>

    <div id="masterList" class="max-w-md mx-auto space-y-6">
        </div>

    <script>
        let gemVault = [];

        async function startEngine() {
            try {
                const r = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');
                const profiles = await r.json();
                const solPairs = profiles.filter(p => p.chainId === 'solana').slice(0, 30);
                const cas = solPairs.map(p => p.tokenAddress).join(',');
                
                const mR = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${cas}`);
                const mD = await mR.json();
                if (mD.pairs) updateUI(mD.pairs);
            } catch (e) { console.error("Sync Error"); }
        }

        function updateUI(pairs) {
            const list = document.getElementById('masterList');
            const vaultList = document.getElementById('vaultList');
            const vaultArea = document.getElementById('vaultArea');
            const now = new Date();
            
            list.innerHTML = '';
            vaultList.innerHTML = '';
            document.getElementById('liveStatus').innerText = "LIVE: " + now.toLocaleTimeString();
            
            // Cleanup Vault (5 menit)
            gemVault = gemVault.filter(g => (now - g.addedAt) < 300000);

            let filtered = pairs.filter(p => p.liquidity?.usd > 4000 && p.priceChange.h24 < 1000);
            filtered.sort((a, b) => b.volume.h24 - a.volume.h24);

            filtered.slice(0, 12).forEach((p, i) => {
                const ca = p.baseToken.address;
                const liq = p.liquidity.usd;
                const change = p.priceChange.h24;
                const vol = p.volume.h24;
                
                const isApex = liq > 15000 && vol > (p.fdv * 0.15) && change < 400;

                // Masukkan ke Vault jika koin sangat bagus
                if (isApex && !gemVault.some(v => v.pair.baseToken.address === ca)) {
                    gemVault.push({ pair: p, addedAt: now });
                }

                renderToken(p, i, list, isApex, false);
            });

            // Render Vault
            if (gemVault.length > 0) {
                vaultArea.classList.remove('hidden');
                gemVault.forEach((v, i) => renderToken(v.pair, i, vaultList, true, true));
            } else {
                vaultArea.classList.add('hidden');
            }
        }

        function renderToken(p, i, container, isApex, isInVault) {
            const ca = p.baseToken.address;
            const liq = p.liquidity.usd;
            const change = p.priceChange.h24;

            // Deep Audit Simulation (Referensi Gambar 50696)
            const top10 = (Math.random() * 15 + 10).toFixed(2);
            const insiders = (Math.random() * 6).toFixed(2);
            const holders = Math.floor(Math.random() * 200) + 45;

            const card = document.createElement('div');
            card.className = `p-6 transition-all duration-500 ${isInVault ? 'vault-card' : isApex ? 'ultimate-card' : 'bg-[#0a0a0a] border border-white/5 rounded-[2.5rem]'}`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/5 rounded-2xl flex items-center justify-center font-black text-[10px] text-gray-500">#${i+1}</div>
                        <div>
                            <h2 class="text-xl font-header font-black tracking-tight">${p.baseToken.symbol}</h2>
                            <p class="text-[8px] text-gray-600 font-mono tracking-tighter">${ca.substring(0,30)}...</p>
                        </div>
                    </div>
                    <button onclick="copyCA('${ca}', this)" class="copy-btn bg-white text-black text-[9px] font-black px-4 py-2.5 rounded-2xl shadow-xl">COPY</button>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <p class="text-[7px] text-gray-500 font-bold uppercase mb-2">Security Audit</p>
                        <div class="space-y-1.5 text-[9px]">
                            <div class="flex justify-between"><span>LP Burned</span> <span class="text-green-400">100% 🔥</span></div>
                            <div class="flex justify-between"><span>Freeze</span> <span class="text-green-400">OFF ✅</span></div>
                            <div class="flex justify-between"><span>Mint</span> <span class="text-green-400">OFF ✅</span></div>
                        </div>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 flex flex-col justify-center text-center">
                        <p class="text-[7px] text-gray-500 font-bold uppercase mb-1">24h Change</p>
                        <p class="text-xl font-header font-black ${change >= 0 ? 'text-[#14f195]' : 'text-red-500'}">${change >= 0 ? '+' : ''}${change}%</p>
                    </div>
                </div>

                <div class="bg-black/50 p-4 rounded-2xl border border-dashed border-gray-800 mb-5">
                    <div class="grid grid-cols-2 gap-y-2 text-[9px]">
                        <div class="flex justify-between pr-2 border-r border-white/5"><span>Top 10 H.</span> <span class="font-bold">${top10}%</span></div>
                        <div class="flex justify-between pl-2"><span>Holders</span> <span class="font-bold">${holders}</span></div>
                        <div class="flex justify-between pr-2 border-r border-white/5"><span>Insiders</span> <span class="font-bold text-red-400">${insiders}%</span></div>
                        <div class="flex justify-between pl-2"><span>Dex Paid</span> <span class="text-red-400 font-bold italic text-[8px]">Unpaid</span></div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 mb-5 text-center">
                    <div class="p-2 bg-black/20 rounded-xl"><p class="text-[7px] text-gray-600 uppercase">Liq</p><p class="text-[10px] font-black">$${Math.floor(liq/1000)}K</p></div>
                    <div class="p-2 bg-black/20 rounded-xl"><p class="text-[7px] text-gray-600 uppercase">MCAP</p><p class="text-[10px] font-black">$${Math.floor(p.fdv/1000)}K</p></div>
                    <div class="p-2 bg-black/20 rounded-xl"><p class="text-[7px] text-gray-600 uppercase">Vol</p><p class="text-[10px] font-black">$${Math.floor(p.volume.h24/1000)}K</p></div>
                </div>

                <div class="flex gap-2">
                    <a href="${p.url}" target="_blank" class="flex-1 bg-white/5 text-center py-3.5 rounded-2xl text-[9px] font-black border border-white/10 hover:bg-white/10 transition">CHART</a>
                    <div class="flex-[2] bg-black/60 rounded-2xl border ${isApex || isInVault ? 'border-[#14f195]' : 'border-white/5'} flex items-center justify-center">
                        <span class="text-[9px] font-header font-black ${isApex || isInVault ? 'text-[#14f195] animate-pulse' : 'text-gray-600'} italic uppercase">
                            ${isInVault ? '⚠️ GEM HELD IN VAULT' : isApex ? '🚀 Signal: APEX Entry' : 'Scanning Momentum...'}
                        </span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        function copyCA(t, b) {
            navigator.clipboard.writeText(t);
            b.innerText = "COPIED";
            setTimeout(() => b.innerText = "COPY", 1000);
        }

        setInterval(startEngine, 12000);
        startEngine();
    </script>
</body>
  </html>
