<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL V10 GENIUS - HYPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .ultimate-card { border: 1px solid #1a1a1a; background: linear-gradient(165deg, #051a10, #000); box-shadow: 0 0 20px rgba(20, 241, 149, 0.05); border-radius: 30px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .ultimate-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #14f195, transparent); opacity: 0.5; }
        .vault-card { border: 2px dashed #ffd700; background: rgba(255, 215, 0, 0.03); border-radius: 30px; }
        .timer-bar { height: 4px; background: #14f195; transition: width 1s linear; width: 100%; box-shadow: 0 0 10px #14f195; }
        
        .badge-status { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; margin-right: 4px; display: inline-block; }
        .bg-early { background: #06b6d4; color: #fff; animation: pulse-fast 0.8s infinite; box-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        .bg-surging { background: #ef4444; color: #fff; animation: pulse-fast 0.6s infinite; }
        .bg-whale { background: #f97316; color: #fff; animation: pulse-fast 0.8s infinite; }
        .bg-safe { background: #10b981; color: #fff; }

        .bg-rank-1 { background: linear-gradient(45deg, #ffd700, #bf953f); color: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }
        .bg-rank-2 { background: linear-gradient(45deg, #e2e8f0, #94a3b8); color: #000; box-shadow: 0 0 15px rgba(226, 232, 240, 0.5); }
        .bg-rank-3 { background: linear-gradient(45deg, #cd7f32, #a0522d); color: #fff; box-shadow: 0 0 15px rgba(205, 127, 50, 0.5); }

        .buy-signal { background: #14f195; color: #000; font-weight: 900; padding: 4px 12px; border-radius: 12px; font-size: 10px; animation: bounce 0.6s infinite alternate; box-shadow: 0 0 20px rgba(20, 241, 149, 0.6); }
        
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }

        #hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 100; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .radar-circle {
            width: 150px; height: 150px; border: 2px solid #14f195;
            border-radius: 50%; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(20, 241, 149, 0.3);
        }
        .radar-sweep {
            position: absolute; width: 50%; height: 50%;
            background: linear-gradient(45deg, transparent, rgba(20, 241, 149, 0.4));
            top: 0; left: 0; transform-origin: bottom right;
            animation: sweep 2s linear infinite;
        }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .hud-text { font-family: 'Orbitron', sans-serif; letter-spacing: 0.3em; color: #14f195; text-shadow: 0 0 10px #14f195; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">
    <div id="hud-overlay">
        <div class="radar-circle mb-6">
            <div class="radar-sweep"></div>
        </div>
        <div id="hud-status-text" class="hud-text text-sm uppercase animate-pulse">SYNCING CORE...</div>
        <div class="mt-4 w-32 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="hud-progress" class="h-full bg-[#14f195] transition-all duration-500" style="width: 0%"></div>
        </div>
    </div>

    <div class="text-center mb-6 pt-4 relative rounded-3xl p-4 border border-white/5 bg-white/[0.02]">
        <h1 class="font-header text-3xl tracking-tighter text-[#14f195]">SENTINEL <span class="text-white text-xl">V10 GENIUS</span></h1>
        <div class="flex justify-center items-center gap-2 text-[10px] mt-2 opacity-60 uppercase tracking-[0.2em]">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-[#14f195] animate-pulse"></div>
            RADAR: <span id="clock">00:00:00</span> | <span id="api-status">SYNCING...</span>
        </div>
        <div class="mt-4 w-full bg-white/10 rounded-full overflow-hidden">
            <div id="timerBar" class="timer-bar"></div>
        </div>
    </div>

    <div id="scanner-container">
        <div id="gem-vault" class="hidden space-y-4 mb-8">
            <div class="text-center text-[#ffd700] text-[10px] font-header mb-2 tracking-[0.3em] uppercase">⚠️ Locked Signal (Vault)</div>
            <div id="vault-list" class="space-y-4"></div>
        </div>
        <div id="token-list" class="space-y-6"></div>
    </div>

    <script>
        const CONFIG = {
            REFRESH_RATE: 10, 
            MIN_LIQUIDITY: 5000, // DITURUNKAN agar koin baru lebih mudah masuk
            MIN_VOLUME: 10000,   // DITURUNKAN agar lebih sensitif
            RPC_URL: 'https://api.mainnet-beta.solana.com',
        };

        let timeLeft = CONFIG.REFRESH_RATE;
        let vault = JSON.parse(localStorage.getItem('sentinel_vault_v10') || '{}');
        let notifiedTokens = new Set();

        function toggleHUD(show, text = "SYNCING...") {
            const hud = document.getElementById('hud-overlay');
            const hudText = document.getElementById('hud-status-text');
            const hudProgress = document.getElementById('hud-progress');
            if (show) { hud.style.display = 'flex'; hudText.innerText = text; hudProgress.style.width = '30%'; }
            else { hud.style.display = 'none'; hudProgress.style.width = '0%'; }
        }

        async function requestNotificationPermission() {
            if ("Notification" in window) await Notification.requestPermission();
        }
        window.onload = requestNotificationPermission;

        function sendPushNotification(tokenSymbol, signal) {
            if (Notification.permission === "granted") {
                const title = signal === 'SUPREME' ? "🔥 SUPREME GEM FOUND!" : "⚡ New Potential Coin!";
                new Notification(title, { body: `${tokenSymbol} terdeteksi dengan sinyal ${signal}. Cek Sentinel sekarang!` });
            }
        }

        function getTimeAgo(t) {
            const s = Math.floor((Date.now() - t) / 1000);
            if (s < 60) return `${s}s ago`;
            if (s < 3600) return `${Math.floor(s/60)}m ago`;
            return `${Math.floor(s/3600)}h ago`;
        }

        async function performAudit(p) {
            try {
                const response = await fetch(CONFIG.RPC_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "getTokenLargestAccounts", params: [p.baseToken.address] })
                });
                const data = await response.json();
                if (!data.result) throw new Error();
                const accounts = data.// result.value;
                const accountsList = data.result.value;
                let concentration = 0;
                accountsList.forEach(acc => concentration += parseInt(acc.amount));
                const isWhaleRisk = concentration > 1000000000000; 
                return { grade: isWhaleRisk ? 'C' : 'A', detail: isWhaleRisk ? 'High Concentration' : 'Distributed', color: isWhaleRisk ? 'text-yellow-500' : 'text-[#14f195]', isWhaleRisk };
            } catch (e) { 
                return { grade: '?', detail: 'Audit Pending', color: 'text-white/40', isWhaleRisk: false }; 
            }
        }

        async function fetchTokens() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('api-status');
            try {
                toggleHUD(true, "SCANNING CORE...");
                statusText.innerText = "SCANNING...";
                
                const profsRes = await fetch('https://api.dexscreener.com/token-profiles/latest/v1');
                const profs = await profsRes.json();
                const solProfiles = profs.filter(p => p.chainId === 'solana').slice(0, 30);
                const addresses = solProfiles.map(p => p.tokenAddress).join(',');
                const pairsRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${addresses}`);
                const data = await pairsRes.json();
                const pairs = (data.pairs || []).filter(p => p.liquidity?.usd > CONFIG.MIN_LIQUIDITY);

                const processedPairs = await Promise.all(pairs.map(async (p) => {
                    const audit = await performAudit(p);
                    const tx = p.txns?.h24 || { buys: 0, sells: 0 };
                    const buyRatio = tx.buys / (tx.buys + tx.sells || 1);
                    const m5Change = p.priceChange?.m5 || 0;
                    
                    let signal = 'NONE';
                    // RELAXED CRITERIA: Buy Ratio diturunkan ke 50% agar lebih banyak koin masuk
                    if (m5Change > 5 && buyRatio > 0.50) signal = 'EARLY';
                    if (m5Change > 15 && buyRatio > 0.7 && audit.grade === 'A') signal = 'SUPREME';

                    const volatility = (p.volume?.h24 / p.liquidity?.usd) || 0;
                    const riskReward = (audit.grade === 'A' && signal === 'EARLY') ? 'High Reward' : (audit.isWhaleRisk ? 'High Risk' : 'Moderate');

                    return { ...p, signal, audit, buyRatio, m5Change, volatility, riskReward, omniScore: (buyRatio * 50) + (m5Change * 2) };
                }));

                const geniusList = processedPairs.filter(p => {
                    if (p.audit.grade === 'F') return false;
                    // RELAXED ADMISSION: OmniScore diturunkan ke 30
                    return (p.signal === 'EARLY' || p.signal === 'SUPREME' || (p.buyRatio > 0.55 && p.m5Change > 2) || (p.omniScore > 30 && p.buyRatio > 0.55));
                }).sort((a, b) => b.omniScore - a.omniScore);

                geniusList.forEach(p => {
                    if (!notifiedTokens.has(p.baseToken.address)) {
                        if (p.signal === 'SUPREME' || p.signal === 'EARLY') sendPushNotification(p.baseToken.symbol, p.signal);
                        notifiedTokens.add(p.baseToken.address);
                    }
                });

                render(geniusList);
                statusText.innerText = "ACTIVE";
                statusDot.className = "w-2 h-2 rounded-full bg-[#14f195] animate-pulse";
                toggleHUD(false);
            } catch (e) {
                toggleHUD(true, "RECONNECTING...");
                statusText.innerText = "RECONNECTING...";
                statusDot.className = "w-2 h-2 rounded-full bg-red-600";
            }
        }

        function render(pairs) {
            const container = document.getElementById('token-list');
            const vaultList = document.getElementById('vault-list');
            const vaultContainer = document.getElementById('gem-vault');

            pairs.forEach(p => {
                if (p.signal === 'SUPREME') vault[p.baseToken.address] = { symbol: p.baseToken.symbol, time: Date.now() };
            });
            localStorage.setItem('sentinel_vault_v10', JSON.stringify(vault));

            const mainPairs = pairs.filter(p => !vault[p.baseToken.address]);
            const vaultPairs = pairs.filter(p => vault[p.baseToken.address]);

            if (mainPairs.length === 0) {
                container.innerHTML = `<div class="text-center p-12 opacity-40"><div class="w-12 h-12 border-4 border-[#14f195] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p class="font-header text-xs tracking-widest text-[#14f195]">SCANNING BLOCKCHAIN...</p><p class="text-[10px] mt-2">No high-potential gems meet the criteria. Hype Mode is Active!</p></div>`;
            } else {
                container.innerHTML = mainPairs.map((p, index) => createCard(p, false, index + 1)).join('');
            }

            if (vaultPairs.length > 0) {
                vaultContainer.classList.remove('hidden');
                vaultList.innerHTML = vaultPairs.map((p, index) => createCard(p, true, index + 1)).join('');
            } else {
                vaultContainer.classList.add('hidden');
            }
        }

        function createCard(p, isInVault, rank) {
            const liq = p.liquidity?.usd || 0;
            const mcap = p.fdv || 0;
            const change = p.priceChange?.h24 || 0;
            const sellRatio = (1 - p.buyRatio) * 100;
            
            let rankClass = ""; let rankBadge = ""; let rankGlow = "";
            if (rank === 1) { rankClass = "border-yellow-400"; rankGlow = "shadow-[0_0_25px_rgba(250,204,21,0.4)]"; rankBadge = '<span class="badge-status bg-rank-1">🏆 ELITE GEM</span>'; }
            else if (rank === 2) { rankClass = "border-slate-300"; rankGlow = "shadow-[0_0_20px_rgba(203,213,225,0.3)]"; rankBadge = '<span class="badge-status bg-rank-2">🥈 PRIME GEM</span>'; }
            else if (rank === 3) { rankClass = "border-orange-600"; rankGlow = "shadow-[0_0_15px_rgba(154,52,18,0.3)]"; rankBadge = '<span class="badge-status bg-rank-3">🥉 ALPHA GEM</span>'; }

            let badges = [];
            if (rank <= 3) badges.push(rankBadge);
            if (p.m5Change > 10) badges.push('<span class="badge-status bg-surging">PUMPING 🔥</span>');
            if (p.audit.isWhaleRisk) badges.push('<span class="badge-status bg-whale">WHALE 🐋</span>');
            if (p.signal === 'EARLY') badges.push('<span class="badge-status bg-early">EARLY SIGNAL ⚡</span>');

            return `
                <div class="${isInVault ? 'vault-card' : 'ultimate-card'} ${rankClass} ${rankGlow} p-6">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-header text-[#14f195] text-sm">#${rank}</span>
                                <h2 class="font-header text-xl uppercase">${p.baseToken.symbol}</h2>
                                ${p.signal === 'SUPREME' ? '<span class="buy-signal">🔥 SUPREME BUY</span>' : ''}
                            </div>
                            <div class="mt-2 flex flex-wrap gap-1">${badges.join('')}</div>
                            <p class="text-[9px] text-white/40 mt-2">Age: <span class="text-[#14f195]">${getTimeAgo(p.pairCreatedAt)}</span></p>
                        </div>
                        <button onclick="navigator.clipboard.writeText('${p.baseToken.address}')" class="bg-white text-black text-[10px] font-bold px-3 py-2 rounded-full uppercase">Copy CA</button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4 text-[10px]">
                        <div class="glass-panel rounded-2xl p-3 border border-white/5">
                            <p class="text-[8px] text-white/40 font-header mb-2 tracking-widest uppercase">Security Audit</p>
                            <div class="flex justify-between items-center">
                                <span class="text-white/60">Grade</span>
                                <span class="${p.audit.color} font-bold text-lg">${p.audit.grade}</span>
                            </div>
                            <div class="text-center text-[9px] ${p.audit.color} font-medium mt-1">${p.audit.detail}</div>
                        </div>
                        <div class="glass-panel rounded-2xl p-3 border border-white/5 text-center flex flex-col justify-center">
                            <p class="text-[8px] text-white/40 font-header mb-1 tracking-widest uppercase">Risk/Reward</p>
                            <div class="text-sm font-bold ${p.audit.isWhaleRisk ? 'text-yellow-500' : 'text-[#14f195]'}">${p.riskReward}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4 text-[10px]">
                        <div class="glass-panel rounded-2xl p-3 border border-white/5">
                            <p class="text-[8px] text-white/40 font-header mb-1 tracking-widest uppercase">Volatility</p>
                            <div class="flex justify-between items-center">
                                <span class="text-white/60">Index</span>
                                <span class="font-bold text-[#14f195]">${p.volatility.toFixed(1)}x</span>
                            </div>
                        </div>
                        <div class="glass-panel rounded-2xl p-3 border border-white/5 text-center flex flex-col justify-center">
                            <p class="text-[8px] text-white/40 font-header mb-1 tracking-widest uppercase">24h Change</p>
                            <div class="text-lg font-bold ${change >= 0 ? 'text-[#14f195]' : 'text-[#ff4b4b]'}">${change >= 0 ? '+' : ''}${change}%</div>
                        </div>
                    </div>
                    <div class="glass-panel rounded-2xl p-3 border border-white/5 mb-6">
                        <div class="flex justify-between text-[10px] mb-2">
                            <span class="text-white/40 uppercase font-header text-[8px]">Order Flow Analysis</span>
                            <div class="flex gap-3">
                                <span class="text-[#14f195] font-bold text-[9px]">Buy: ${(p.buyRatio*100).toFixed(0)}%</span>
                                <span class="text-[#ff4b4b] font-bold text-[9px]">Sell: ${sellRatio.toFixed(0)}%</span>
                            </div>
                        </div>
                        <div class="h-2 bg-white/10 rounded-full overflow-hidden flex p-0.5">
                            <div class="h-full bg-[#14f195] rounded-full shadow-[0_0_8px_#14f195] transition-all duration-500" style="width: ${p.buyRatio*100}%"></div>
                            <div class="h-full bg-[#ff4b4b] rounded-full transition-all duration-500" style="width: ${sellRatio}%"></div>
                        </div>
                        ${p.signal === 'SUPREME' ? `<div class="mt-3 pt-2 border-t border-white/10 text-center"><p class="text-[8px] text-[#14f195] font-bold uppercase tracking-tighter italic">Hold Strategy: Sell when Buy Pressure &lt; 60%</p></div>` : ''}
                    </div>
                    <div class="grid grid-cols-3 gap-2 text-center mb-6">
                        <div class="bg-white/5 p-2 rounded-xl"><span class="text-[8px] text-white/30 font-header">Liq</span><div class="text-[#14f195] font-bold text-[12px]">$${(liq/1000).toFixed(0)}K</div></div>
                        <div class="bg-white/5 p-2 rounded-xl"><span class="text-[8px] text-white/30 font-header">Mcap</span><div class="font-bold text-[12px]">$${(mcap/1000).toFixed(0)}K</div></div>
                        <div class="bg-white/5 p-2 rounded-xl"><span class="text-[8px] text-white/30 font-header">Vol 24h</span><div class="text-white/70 font-bold text-[12px]">$${(p.volume?.h24/1000 || 0).toFixed(0)}K</div></div>
                    </div>
                    <div class="flex gap-3 w-full">
                        <a href="${p.url}" target="_blank" class="flex-1 bg-[#14f195] text-black text-[11px] font-bold py-4 rounded-2xl text-center uppercase tracking-widest hover:opacity-80 transition-opacity">Open Chart</a>
                        <a href="https://rugcheck.xyz/tokens/${p.baseToken.address}" target="_blank" class="flex-1 bg-white/10 border border-white/10 text-white text-[11px] font-bold py-4 rounded-2xl text-center uppercase tracking-widest">RugCheck 🔍</a>
                    </div>
                </div>
            `;
        }

        setInterval(() => {
            timeLeft--;
            document.getElementById('timerBar').style.width = (timeLeft / CONFIG.REFRESH_RATE * 100) + '%';
            if (timeLeft <= 0) { fetchTokens(); timeLeft = CONFIG.REFRESH_RATE; }
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
        fetchTokens();
    </script>
</body>
</html>
